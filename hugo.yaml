baseURL: https://amisgo-doc.pages.dev/
defaultContentLanguage: zh-cn
languageCode: zh-CN
title: amisgo

module:
  imports:
    - path: github.com/imfing/hextra # hextra theme

# https://imfing.github.io/hextra/docs/

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: 背景
      weight: 1
      pageRef: /background/dev-frontend-with-go
      params:
        icon: dots-horizontal
    - name: 教程
      weight: 2
      pageRef: /tutorials/quick-start
      params:
        icon: book-open
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4
      url: "https://github.com/zrcoder/amisgo"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: /logo.svg
  editURL:
    enable: true
    base: "https://github.com/zrcoder/amisgo-doc/edit/main/content/"
  theme:
    # light | dark | system
    default: light
    displayToggle: false
  footer:
    enable: false

  comments:
    enable: false
